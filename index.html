<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, height=device-height, initial-scale=1.0"
        />
        <title>Tent Parts Generator</title>
        <meta
            name="description"
            content="Generate a list of parts needed for assembling tents at a festival."
        />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="theme-toggle">
            <label for="themeSwitch">Dark Theme:</label>
            <input type="checkbox" id="themeSwitch" onclick="toggleTheme()" />
        </div>
        <div class="container">
            <img src="images/efmf-logo.png" alt="Website Logo" class="logo" />
            <h1>Tent Parts Generator</h1>
            <div class="tent-container">
                <!-- Populated dynamically from tents object in script.js -->
            </div>
            <div class="button-container">
                <button onclick="generatePartsList()">Generate Parts List</button>
                <button onclick="resetInputs()">Reset</button>
            </div>
            <div id="partsList"></div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
