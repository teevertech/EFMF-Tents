<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, height=device-height, initial-scale=1.0"
        />
        <title>Tent Parts Generator</title>
        <meta
            name="description"
            content="Generate a list of parts needed for assembling tents at a festival."
        />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="theme-toggle">
            <label for="themeSwitch">Dark Theme:</label>
            <input type="checkbox" id="themeSwitch" onclick="toggleTheme()" />
        </div>
        <div class="container">
            <img src="images/efmf-logo.png" alt="Website Logo" class="logo" />
            <h1>Tent Parts Generator</h1>
            <div class="tent-container">
                <div class="tent">
                    <label for="tent10x10">10' x 10':</label>
                    <input type="number" id="tent10x10" value="0" min="0" />
                    <button onclick="increment('tent10x10')">+</button>
                    <button onclick="decrement('tent10x10')">-</button>
                </div>
                <div class="tent">
                    <label for="tent10x20">10' x 20':</label>
                    <input type="number" id="tent10x20" value="0" min="0" />
                    <button onclick="increment('tent10x20')">+</button>
                    <button onclick="decrement('tent10x20')">-</button>
                </div>
                <div class="tent">
                    <label for="tent20x30">20' x 30':</label>
                    <input type="number" id="tent20x30" value="0" min="0" />
                    <button onclick="increment('tent20x30')">+</button>
                    <button onclick="decrement('tent20x30')">-</button>
                </div>
            </div>
            <div class="button-container">
                <button onclick="generatePartsList()">
                    Generate Parts List
                </button>
                <button onclick="resetInputs()">Reset</button>
            </div>
            <div id="partsList"></div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
